name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
        env:
          # Provide a dummy Resend key so the build doesn't try to import a missing module.
          # The contact route checks for the key at request time, not at build time.
          RESEND_API_KEY: re_dummy_build_time_only
          CONTACT_TO_EMAIL: build@example.com
          CONTACT_FROM_EMAIL: noreply@example.com
